spring.application.name=wallet

# --- Datasource ---
spring.datasource.url=jdbc:postgresql://localhost:5433/wallet
spring.datasource.username=wallet
spring.datasource.password=wallet

# --- Performance: connection pool (Phase 10) ---
# HikariCP sizing: SMALL pools beat large ones. A pooled connection is only useful while a thread
# is actively running a query; idle-but-checked-out connections just add contention on the DB.
# Rule of thumb ~ (cores * 2) + spindles; for most web apps 10 is plenty. Oversized pools mostly
# add latency and can overwhelm Postgres' own max_connections.
spring.datasource.hikari.pool-name=wallet-pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
# Log a warning if a connection is held longer than 20s — catches leaks (a connection never closed).
spring.datasource.hikari.leak-detection-threshold=20000

# --- JPA / Hibernate ---
# Flyway owns the schema. Hibernate must NOT create or alter tables.
spring.jpa.hibernate.ddl-auto=validate
# Log SQL during dev so we can see what Hibernate emits (turn off in prod).
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Performance: JPA (Phase 10) ---
# Disable Open Session In View. OSIV keeps the DB connection + Hibernate session open for the
# WHOLE request (including view rendering), which (a) holds a pooled connection longer than needed
# and (b) hides N+1 problems by letting lazy loads succeed outside the service layer. Off = lazy
# access must happen inside a @Transactional boundary, which is the correct, explicit design.
spring.jpa.open-in-view=false
# Batch writes: send multiple INSERT/UPDATE statements in one JDBC round-trip instead of one each.
# order_inserts/updates groups same-table statements so they can actually batch.
# NOTE: batching INSERTs only works for non-IDENTITY ids — see the LedgerEntry SEQUENCE change (V4).
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- JWT ---
# In prod: set via env var WALLET_JWT_SECRET (must be at least 32 bytes for HS256).
# In dev: the default below works but MUST be replaced before going live.
wallet.jwt.secret=${WALLET_JWT_SECRET:dev-only-secret-change-me-32-bytes-minimum-1234}
wallet.jwt.ttl-seconds=3600

# --- Redis / Cache ---
# Backs the Spring Cache abstraction. Run `docker compose up` to start Redis on 6379.
spring.data.redis.host=${REDIS_HOST:localhost}
# Host 6379 is taken by Homebrew Redis; the wallet Docker Redis is published on host 6380.
spring.data.redis.port=${REDIS_PORT:6380}
spring.cache.type=redis

# --- Observability (Phase 8) ---
# Which Actuator endpoints are reachable over HTTP. Keep this an explicit allow-list:
# never expose everything (`*`) in production.
management.endpoints.web.exposure.include=health,info,metrics,prometheus
# Show component health (db, redis, diskSpace) — fine in dev; use when_authorized in prod.
management.endpoint.health.show-details=always
# Enable Kubernetes-style liveness/readiness probes at /actuator/health/{liveness,readiness}.
management.endpoint.health.probes.enabled=true
# Tag every metric with the app name so dashboards can filter by service.
management.metrics.tags.application=${spring.application.name}
# Tracing: sample 100% of requests in dev (lower this in prod, e.g. 0.1 = 10%).
management.tracing.sampling.probability=1.0
# Surface build + git info on /actuator/info.
management.info.build.enabled=true
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.description=Wallet/Payments masterclass service
